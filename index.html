<script>
// =========================================================
// ESTADO GLOBAL
// =========================================================
var APP = {
  tela: 'inicio',
  mesSelecionado: '',
  tratativa: {
    itens: [],
    itemAtivo: 0
  },
  produtoEditando: null,
  tratativaVisualizando: null,
  fotoCallback: null,
  fotoMultiplo: false
};

// =========================================================
// UTILS
// =========================================================
function gerarId() {
  return Date.now() + '_' + Math.floor(Math.random() * 100000);
}

function mesAtual() {
  var d = new Date();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  return d.getFullYear() + '-' + m;
}

function hojeStr() {
  var d = new Date();
  var dia = String(d.getDate()).padStart(2, '0');
  var mes = String(d.getMonth() + 1).padStart(2, '0');
  return d.getFullYear() + '-' + mes + '-' + dia;
}

function formatarData(iso) {
  if (!iso) return '';
  var p = iso.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}

function formatarMes(ym) {
  if (!ym) return '';
  var meses = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var p = ym.split('-');
  return meses[parseInt(p[1]) - 1] + '/' + p[0];
}

function formatarReal(v) {
  var n = parseFloat(v) || 0;
  return 'R$ ' + n.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function formatarNum(v, unid) {
  var n = parseFloat(v) || 0;
  if (unid === 'kg') return n.toFixed(3).replace('.', ',') + ' kg';
  return String(Math.round(n)) + ' un';
}

function toast(msg, tipo) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast visivel' + (tipo === 'erro' ? ' erro' : '');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.className = 'toast'; }, 2800);
}

function diasNoMes(ym) {
  var p = ym.split('-');
  return new Date(parseInt(p[0]), parseInt(p[1]), 0).getDate();
}

function diaAtualDoMes() {
  return new Date().getDate();
}

// =========================================================
// STORAGE — anti-estouro robusto
// =========================================================
var ST = {
  set: function(k, v) {
    try {
      localStorage.setItem(k, JSON.stringify(v));
      return true;
    } catch(e) {
      toast('Armazenamento cheio! Liberando espaco...', 'erro');
      ST._liberar();
      try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch(e2) { return false; }
    }
  },
  get: function(k, def) {
    try {
      var v = localStorage.getItem(k);
      if (v === null) return def !== undefined ? def : null;
      return JSON.parse(v);
    } catch(e) { return def !== undefined ? def : null; }
  },
  del: function(k) { try { localStorage.removeItem(k); } catch(e) {} },
  _liberar: function() {
    // Remove fotos antigas se necessário
    var meses = ST.get('flv_meses', []);
    if (meses.length > 3) {
      var antigo = meses[0];
      var idx = ST.get('flv_idx_' + antigo, []);
      idx.forEach(function(id) {
        // remove fotos desse id
        for (var c of ['produto', 'balanca', 'etiqueta']) {
          for (var i = 0; i < 20; i++) {
            ST.del('flv_ph_' + id + '_' + i + '_' + c);
          }
        }
        ST.del('flv_t_' + id);
      });
      ST.del('flv_idx_' + antigo);
      meses.shift();
      ST.set('flv_meses', meses);
    }
  }
};

// =========================================================
// PRODUTOS
// =========================================================
var Produtos = {
  listar: function(incluirInativos) {
    var lista = ST.get('flv_produtos', []);
    if (!incluirInativos) lista = lista.filter(function(p) { return p.ativo !== false; });
    return lista;
  },
  salvar: function(lista) {
    ST.set('flv_produtos', lista);
  },
  adicionar: function(prod) {
    var lista = Produtos.listar(true);
    prod.id = gerarId();
    prod.ativo = true;
    lista.push(prod);
    Produtos.salvar(lista);
    return prod;
  },
  atualizar: function(id, dados) {
    var lista = Produtos.listar(true);
    var idx = lista.findIndex(function(p) { return p.id === id; });
    if (idx < 0) return false;
    Object.assign(lista[idx], dados);
    Produtos.salvar(lista);
    return true;
  },
  buscar: function(q) {
    q = q.toLowerCase().trim();
    return Produtos.listar(false).filter(function(p) {
      return p.nome.toLowerCase().includes(q) || p.codigo.toLowerCase().includes(q);
    });
  },
  porCodigo: function(cod) {
    return Produtos.listar(true).find(function(p) { return p.codigo === cod; });
  },
  porId: function(id) {
    return Produtos.listar(true).find(function(p) { return p.id === id; });
  }
};

// =========================================================
// TRATATIVAS
// =========================================================
var Tratativas = {
  _registrarMes: function(ym) {
    var meses = ST.get('flv_meses', []);
    if (meses.indexOf(ym) < 0) { meses.push(ym); meses.sort(); ST.set('flv_meses', meses); }
  },
  salvar: function(trat) {
    var ym = trat.data.substring(0, 7);
    trat.mes = ym;
    ST.set('flv_t_' + trat.id, trat);
    var idx = ST.get('flv_idx_' + ym, []);
    if (idx.indexOf(trat.id) < 0) { idx.push(trat.id); ST.set('flv_idx_' + ym, idx); }
    Tratativas._registrarMes(ym);
  },
  listarMes: function(ym) {
    var idx = ST.get('flv_idx_' + ym, []);
    return idx.map(function(id) { return ST.get('flv_t_' + id, null); }).filter(Boolean);
  },
  porId: function(id) { return ST.get('flv_t_' + id, null); },
  meses: function() { return ST.get('flv_meses', []); },
  salvarFotos: function(tratId, itemIdx, campo, fotos) {
    ST.set('flv_ph_' + tratId + '_' + itemIdx + '_' + campo, fotos);
  },
  getFotos: function(tratId, itemIdx, campo) {
    return ST.get('flv_ph_' + tratId + '_' + itemIdx + '_' + campo, []);
  },
  contarFotos: function(tratId, numItens) {
    var total = 0;
    for (var i = 0; i < numItens; i++) {
      total += Tratativas.getFotos(tratId, i, 'produto').length;
      total += Tratativas.getFotos(tratId, i, 'balanca').length;
      total += Tratativas.getFotos(tratId, i, 'etiqueta').length;
    }
    return total;
  }
};

// =========================================================
// VENDAS / FLUIG
// =========================================================
var Vendas = {
  salvar: function(data, valor) { ST.set('flv_venda_' + data, parseFloat(valor) || 0); },
  get: function(data) { return ST.get('flv_venda_' + data, 0); },
  totalMes: function(ym) {
    var total = 0;
    var dias = diasNoMes(ym);
    for (var d = 1; d <= dias; d++) {
      var ds = ym + '-' + String(d).padStart(2, '0');
      total += Vendas.get(ds);
    }
    return total;
  }
};

var Fluigs = {
  listar: function(ym) { return ST.get('flv_fluigs_' + ym, []); },
  salvar: function(ym, lista) { ST.set('flv_fluigs_' + ym, lista); },
  adicionar: function(ym, item) {
    var lista = Fluigs.listar(ym);
    item.id = gerarId();
    lista.push(item);
    Fluigs.salvar(ym, lista);
  },
  totalMes: function(ym) {
    return Fluigs.listar(ym).reduce(function(a, f) { return a + (parseFloat(f.valor) || 0); }, 0);
  }
};

var Meta = {
  get: function() { return parseFloat(ST.get('flv_meta', 3.5)); },
  set: function(v) { ST.set('flv_meta', parseFloat(v)); }
};

// =========================================================
// COMPRESSÃO DE FOTO
// =========================================================
function comprimirFoto(file, maxPx, qualidade, cb) {
  maxPx = maxPx || 800;
  qualidade = qualidade || 0.72;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', qualidade));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// =========================================================
// GERAR TEXTO WHATSAPP
// =========================================================
function gerarTextoWA(itens) {
  var blocos = [];
  itens.forEach(function(it) {
    if (!it.produtoId) return;
    var prod = Produtos.porId(it.produtoId);
    if (!prod) return;
    var chegou = it.unidade === 'kg'
      ? (parseFloat(it.chegou) || 0).toFixed(1).replace('.', ',')
      : String(Math.round(parseFloat(it.chegou) || 0));
    var quebra = it.unidade === 'kg'
      ? (parseFloat(it.quebra) || 0).toFixed(1).replace('.', ',')
      : String(Math.round(parseFloat(it.quebra) || 0));
    var unNome = it.unidade === 'kg' ? 'KG' : 'UN';
    var dataFmt = formatarData(it.data);
    var bloco = 'Codigo\nCod: ' + prod.codigo + '\n' + prod.nome.toUpperCase() + ' ' + unNome + '\n' + dataFmt + '\nChegou: ' + chegou + ' ' + (it.unidade === 'kg' ? 'kg' : 'un') + '\nQuantidade da quebra: ' + quebra + ' ' + (it.unidade === 'kg' ? 'kg' : 'un');
    blocos.push(bloco);
  });
  return blocos.join('\n\n');
}

// =========================================================
// CÁLCULOS DASHBOARD
// =========================================================
function calcDash(ym) {
  var trats = Tratativas.listarMes(ym);
  var vendas = Vendas.totalMes(ym);
  var fluig = Fluigs.totalMes(ym);
  var quebraR = 0;
  trats.forEach(function(t) {
    (t.itens || []).forEach(function(it) {
      var prod = Produtos.porId(it.produtoId);
      if (!prod) return;
      quebraR += (parseFloat(it.quebra) || 0) * (parseFloat(prod.preco) || 0);
    });
  });
  var pctBruta = vendas > 0 ? (quebraR / vendas) * 100 : 0;
  var quebraLiq = quebraR - fluig;
  var pctLiq = vendas > 0 ? (quebraLiq / vendas) * 100 : 0;
  var meta = Meta.get();
  // projeção
  var diaAtual = ym === mesAtual() ? diaAtualDoMes() : diasNoMes(ym);
  var total = diasNoMes(ym);
  var vendaProj = diaAtual > 0 ? (vendas / diaAtual) * total : 0;
  var quebraProj = diaAtual > 0 ? (quebraLiq / diaAtual) * total : 0;
  var pctProj = vendaProj > 0 ? (quebraProj / vendaProj) * 100 : 0;
  var limiteR = vendaProj > 0 ? (vendaProj * meta / 100) - quebraLiq : 0;
  // top produtos
  var topMap = {};
  trats.forEach(function(t) {
    (t.itens || []).forEach(function(it) {
      var prod = Produtos.porId(it.produtoId);
      if (!prod) return;
      var r = (parseFloat(it.quebra) || 0) * (parseFloat(prod.preco) || 0);
      if (!topMap[it.produtoId]) topMap[it.produtoId] = { nome: prod.nome, r: 0 };
      topMap[it.produtoId].r += r;
    });
  });
  var top = Object.values(topMap).sort(function(a, b) { return b.r - a.r; }).slice(0, 6);
  return {
    vendas: vendas, fluig: fluig, quebraR: quebraR,
    quebraLiq: quebraLiq, pctBruta: pctBruta, pctLiq: pctLiq,
    meta: meta, vendaProj: vendaProj, quebraProj: quebraProj,
    pctProj: pctProj, limiteR: limiteR, top: top,
    diaAtual: diaAtual, totalDias: total
  };
}

// =========================================================
// SPLASH CANVAS
// =========================================================
function desenharSplash() {
  var c = document.getElementById('canvas-splash');
  if (!c) return;
  var ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 200, 200);
  // Fundo
  var g = ctx.createLinearGradient(0, 0, 200, 200);
  g.addColorStop(0, '#2d8a2d'); g.addColorStop(1, '#1c4a1c');
  ctx.fillStyle = g; ctx.beginPath();
  ctx.roundRect(0, 0, 200, 200, 24); ctx.fill();
  // Vegetais
  var v = [
    {x:50, y:60, e:'🍉', s:38},
    {x:150, y:55, e:'🥬', s:34},
    {x:100, y:110, e:'🌽', s:40},
    {x:48, y:148, e:'🍌', s:32},
    {x:152, y:150, e:'🍅', s:34},
    {x:100, y:54, e:'🥦', s:28}
  ];
  ctx.font = '34px serif';
  v.forEach(function(vg) {
    ctx.font = vg.s + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(vg.e, vg.x, vg.y);
  });
}

// =========================================================
// RENDERIZAÇÃO DAS TELAS
// =========================================================
function navegar(tela) {
  APP.tela = tela;
  document.querySelectorAll('.nav-btn').forEach(function(b) {
    b.classList.toggle('ativo', b.dataset.tela === tela);
  });
  var titulos = { inicio:'Inicio', produtos:'Produtos', tratativa:'Nova Tratativa', dashboard:'Dashboard', historico:'Historico' };
  document.getElementById('header-titulo').textContent = titulos[tela] || tela;
  renderizarTela(tela);
}

function renderizarTela(tela) {
  var cont = document.getElementById('conteudo');
  cont.innerHTML = '';
  if (tela === 'inicio') renderInicio(cont);
  else if (tela === 'produtos') renderProdutos(cont);
  else if (tela === 'tratativa') renderTratativa(cont);
  else if (tela === 'dashboard') renderDashboard(cont);
  else if (tela === 'historico') renderHistorico(cont);
}

// =========================================================
// TELA: INÍCIO
// =========================================================
function renderInicio(cont) {
  var ym = mesAtual();
  var dash = calcDash(ym);
  var hoje = hojeStr();
  var meta = dash.meta;
  var pct = dash.pctLiq;
  var bom = pct <= meta;
  var pctFill = Math.min((pct / meta) * 100, 100);
  var corBarra = pct > meta ? 'alerta' : '';

  var html = '';
  // Card situação
  html += '<div class="card-situacao">';
  html += '<div class="sit-titulo">Situacao do Mes - ' + formatarMes(ym) + '</div>';
  html += '<div class="sit-status">' + (bom ? '\u2705 BOM' : '\ud83d\udd34 ALERTA') + '</div>';
  html += '<div class="sit-detalhe">Quebra liquida: <strong>' + pct.toFixed(2).replace('.', ',') + '%</strong> &nbsp;|&nbsp; Bruta: <strong>' + dash.pctBruta.toFixed(2).replace('.', ',') + '%</strong></div>';
  html += '<div class="sit-meta">Meta: ' + meta.toFixed(1).replace('.', ',') + '%</div>';
  html += '</div>';

  // Barra meta
  html += '<div class="barra-meta-wrap">';

  // Recentes do mês
  var trats = Tratativas.listarMes(ym).slice(-5).reverse();

  } else {
    trats.forEach(function(t) {

        var p = Produtos.porId(i.produtoId);
        return p ? p.nome : '?';

      html += '<div class="lista-item-valor">' + formatarReal(totalR) + '</div>';
      html += '</div>';
    });

  cont.innerHTML = html;
}

function filtrarProdutos() {
  var q = (document.getElementById('busca-prod') || {value: ''}).value.trim();
  var lista = q.length >= 2 ? Produtos.buscar(q) : Produtos.listar(true);
  var el = document.getElementById('lista-produtos');
  if (!el) return;
  if (lista.length === 0) {
    el.innerHTML = '<div class="texto-vazio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>Nenhum produto encontrado</div>';
    return;
  }
  var html = '';
  lista.forEach(function(p) {
    html += '<div class="prod-item' + (p.ativo === false ? ' inativo' : '') + '" onclick="abrirModalProduto(\'' + p.id + '\')">';
    html += '<div class="prod-item-icone">\ud83c\udf3f</div>';
    html += '<div class="prod-item-info">';
    html += '<div class="prod-item-nome">' + escHtml(p.nome) + (p.ativo === false ? ' <span class="badge badge-neutro">Inativo</span>' : '') + '</div>';
    html += '<div class="prod-item-cod">Cod: ' + escHtml(p.codigo) + ' &nbsp;|&nbsp; ' + p.unidade + ' &nbsp;|&nbsp; Meta: ' + (parseFloat(p.metaQuebra) || 0).toFixed(1) + '%</div>';
    html += '</div>';
    html += '<div class="prod-item-preco">' + formatarReal(p.preco) + '</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

  html += '<div class="form-group"><label class="form-label">Nome do Produto *</label>';
  html += '<input class="form-input" id="mp-nome" value="' + (prod ? escHtml(prod.nome) : '') + '" placeholder="Ex: Melancia"></div>';

  html += '<div class="form-group"><label class="form-label">Unidade</label>';
  html += '<select class="form-select" id="mp-unid"><option value="kg"' + (prod && prod.unidade === 'kg' ? ' selected' : '') + '>kg</option><option value="un"' + (prod && prod.unidade === 'un' ? ' selected' : '') + '>un (unidade)</option></select></div>';
  html += '<div class="form-group"><label class="form-label">Preco (R$)</label>';

  }

  html += '<button class="btn btn-secundario" style="flex:1" onclick="fecharModal()">Cancelar</button>';

function salvarProdutoModal(id) {
  var cod = document.getElementById('mp-cod').value.trim();
  var nome = document.getElementById('mp-nome').value.trim();
  var unid = document.getElementById('mp-unid').value;
  var preco = parseFloat(document.getElementById('mp-preco').value) || 0;
  var metaQ = parseFloat(document.getElementById('mp-meta').value) || 3.5;
  if (!cod || !nome) { toast('Preencha codigo e nome', 'erro'); return; }
  if (id) {
    var aEl = document.getElementById('mp-ativo');
    var ativo = aEl ? aEl.value === '1' : true;
    Produtos.atualizar(id, { codigo: cod, nome: nome, unidade: unid, preco: preco, metaQuebra: metaQ, ativo: ativo });
    toast('Produto atualizado!');
  } else {
    var existente = Produtos.porCodigo(cod);
    if (existente) { toast('Codigo ja cadastrado!', 'erro'); return; }
    Produtos.adicionar({ codigo: cod, nome: nome, unidade: unid, preco: preco, metaQuebra: metaQ });
    toast('Produto cadastrado!');
  }
  fecharModal();
  filtrarProdutos();
}

function ativarFotoIA(origem) {
  var el = document.getElementById(origem === 'camera' ? 'input-camera' : 'input-galeria');
  APP.fotoCallback = function(files) { processarFotoIA(files[0]); };
  APP.fotoMultiplo = false;
  el.click();
}

function processarFotoIA(file) {
  if (!file) return;
  var st = document.getElementById('ia-status');
  if (!st) return;
  st.innerHTML = '<div class="ai-loading"><div class="spinner"></div>Analisando com IA...</div>';
  comprimirFoto(file, 800, 0.8, function(b64) {
    var imgData = b64.split(',')[1];
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'x-api-key': '' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: [{
            type: 'image',
            source: { type: 'base64', media_type: 'image/jpeg', data: imgData }
          }, {
            type: 'text',
            text: 'Analise esta imagem de produto ou nota fiscal de hortifruti. Extraia: codigo do produto (numero) e nome do produto. Responda APENAS em JSON sem markdown: {"codigo":"...","nome":"..."}'
          }]
        }]
      })
    }).then(function(r) { return r.json(); }).then(function(data) {
      var txt = (data.content && data.content[0] && data.content[0].text) || '{}';
      var clean = txt.replace(/```json|```/g, '').trim();
      try {
        var obj = JSON.parse(clean);
        preencherFormularioIA(obj.codigo || '', obj.nome || '');
      } catch(e) { if (st) st.innerHTML = '<p style="color:#c00">Nao foi possivel extrair dados. Preencha manualmente.</p>'; }
    }).catch(function() {
      if (st) st.innerHTML = '<p style="color:#c00">Erro ao chamar IA. Disponivel apenas em HTTPS.</p>';
    });
  });
}

function preencherFormularioIA(cod, nome) {
  var st = document.getElementById('ia-status');
  var res = document.getElementById('ia-resultado');
  if (st) st.innerHTML = '';
  if (!res) return;
  var html = '<div style="background:#f0f7ee;border-radius:10px;padding:12px;margin-bottom:12px">';
  html += '<div style="font-size:0.75rem;font-weight:800;color:var(--verde-medio);margin-bottom:8px">DADOS ENCONTRADOS</div>';
  html += '<div class="form-group"><label class="form-label">Codigo</label><input class="form-input" id="ia-cod" value="' + escHtml(cod) + '"></div>';
  html += '<div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="ia-nome" value="' + escHtml(nome) + '"></div>';
  html += '<div class="form-row">';
  html += '<div class="form-group"><label class="form-label">Unidade</label><select class="form-select" id="ia-unid"><option value="kg">kg</option><option value="un">un</option></select></div>';
  html += '<div class="form-group"><label class="form-label">Preco (R$)</label><input class="form-input" id="ia-preco" type="number" step="0.01" placeholder="0,00"></div>';
  html += '</div>';
  html += '<button class="btn btn-primario btn-bloco" onclick="salvarProdutoIA()">Cadastrar Produto</button>';
  html += '</div>';
  res.innerHTML = html;
}

function salvarProdutoIA() {
  var cod = document.getElementById('ia-cod').value.trim();
  var nome = document.getElementById('ia-nome').value.trim();
  var unid = document.getElementById('ia-unid').value;
  var preco = parseFloat(document.getElementById('ia-preco').value) || 0;

  fecharModal();
  filtrarProdutos();
}

  html += '<div class="fotos-titulo">\ud83c\udff7\ufe0f Foto da Etiqueta <span style="font-size:0.68rem;color:#aaa">(apenas 1)</span></div>';
  html += '<div class="fotos-btns">';
  html += '<button class="btn btn-secundario btn-sm" onclick="ativarFotoTrat(\'camera\',\'etiqueta\',' + idx + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Camera</button>';
  html += '<button class="btn btn-secundario btn-sm" onclick="ativarFotoTrat(\'galeria\',\'etiqueta\',' + idx + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Galeria</button>';
  html += '</div>';
  html += renderPreviewFotos(it.fotos.etiqueta, idx, 'etiqueta');
  html += '</div>';

  html += '</div>';
  el.innerHTML = html;
  atualizarBarraQuebra();
  atualizarPreviewWA();
  bindAutocompleteTrat();
}

function renderPreviewFotos(fotos, idx, campo) {
  if (!fotos || fotos.length === 0) return '<div class="fotos-preview" id="prev-' + idx + '-' + campo + '"></div>';
  var html = '<div class="fotos-preview" id="prev-' + idx + '-' + campo + '">';
  fotos.forEach(function(src, fi) {
    html += '<div class="foto-thumb"><img src="' + src + '"><button class="del-foto" onclick="removerFotoTrat(' + idx + ',\'' + campo + '\',' + fi + ')">x</button></div>';
  });
  html += '</div>';
  return html;
}

function ativarFotoTrat(origem, campo, idx, multiplo) {
  var el = document.getElementById(origem === 'camera' ? 'input-camera' : 'input-galeria');
  if (campo === 'etiqueta') {
    el = document.getElementById('input-camera');
    if (origem === 'galeria') el = document.getElementById('input-galeria');
    APP.fotoMultiplo = false;
  } else {
    APP.fotoMultiplo = !!multiplo;
  }
  APP.fotoCallback = function(files) {
    var arr = Array.prototype.slice.call(files);
    if (campo === 'etiqueta') arr = arr.slice(0, 1);
    var done = 0;
    arr.forEach(function(f) {
      comprimirFoto(f, 800, 0.72, function(b64) {
        var it = APP.tratativa.itens[idx];
        if (!it) return;
        if (campo === 'etiqueta') it.fotos.etiqueta = [b64];
        else it.fotos[campo].push(b64);
        done++;
        if (done === arr.length) {
          renderItemTratativaAtivo();
        }
      });
    });
  };
  el.multiple = !!APP.fotoMultiplo;
  el.click();
}

function removerFotoTrat(idx, campo, fi) {
  var it = APP.tratativa.itens[idx];
  if (!it) return;
  it.fotos[campo].splice(fi, 1);
  renderItemTratativaAtivo();
}

function bindAutocompleteTrat() {
  // Fechar ao clicar fora
  document.addEventListener('click', function fecharAC(e) {
    var lista = document.getElementById('ac-lista');
    if (lista && !lista.contains(e.target)) {
      lista.style.display = 'none';
    }
  });
}

function acProdutos(q, idx) {
  var lista = document.getElementById('ac-lista');
  if (!lista) return;
  if (q.length < 2) { lista.style.display = 'none'; return; }
  var prods = Produtos.buscar(q).slice(0, 8);
  if (prods.length === 0) { lista.style.display = 'none'; return; }
  var html = '';
  prods.forEach(function(p) {
    html += '<div class="autocomplete-item" onmousedown="selecionarProdTrat(\'' + p.id + '\',' + idx + ')">';
    html += '<span class="autocomplete-item-codigo">' + escHtml(p.codigo) + '</span>';
    html += '<span style="flex:1">' + escHtml(p.nome) + '</span>';
    html += '<span class="autocomplete-item-unid">' + p.unidade + '</span>';
    html += '</div>';
  });
  lista.innerHTML = html;
  lista.style.display = 'block';
}

function selecionarProdTrat(prodId, idx) {
  var prod = Produtos.porId(prodId);
  if (!prod) return;
  APP.tratativa.itens[idx].produtoId = prodId;
  APP.tratativa.itens[idx].produtoNome = prod.nome;
  APP.tratativa.itens[idx].unidade = prod.unidade;
  var inp = document.getElementById('trat-prod-input');
  if (inp) inp.value = prod.nome;
  var lista = document.getElementById('ac-lista');
  if (lista) lista.style.display = 'none';
  atualizarTabsAtiva();
  atualizarPreviewWA();
}

function updateItemField(campo, val, idx) {
  if (APP.tratativa.itens[idx]) APP.tratativa.itens[idx][campo] = val;
  if (campo === 'unidade') renderItemTratativaAtivo();
  atualizarPreviewWA();
}

function atualizarBarraQuebra() {
  var chegouEl = document.getElementById('trat-chegou');
  var quebraEl = document.getElementById('trat-quebra');
  var barraEl = document.getElementById('barra-quebra-fill');
  var labelEl = document.getElementById('pct-quebra-label');
  if (!chegouEl || !quebraEl || !barraEl || !labelEl) return;
  var ch = parseFloat(chegouEl.value) || 0;
  var qb = parseFloat(quebraEl.value) || 0;
  var pct = ch > 0 ? (qb / ch) * 100 : 0;
  var fill = Math.min(pct, 100);
  barraEl.style.width = fill + '%';
  barraEl.className = 'barra-quebra-fill' + (pct > 10 ? ' alerta' : '');
  labelEl.textContent = pct.toFixed(1).replace('.', ',') + '%';
}

function atualizarPreviewWA() {
  var el = document.getElementById('preview-wa');
  if (!el) return;
  var txt = gerarTextoWA(APP.tratativa.itens);
  el.textContent = txt || '(Preencha os campos para ver o preview)';
}

function atualizarTabsAtiva() {
  var tabs = document.getElementById('tabs-tratativa');
  if (!tabs) return;
  var btns = tabs.querySelectorAll('.item-tab');
  btns.forEach(function(b, i) {
    if (b.textContent.trim() === '+ Item') return;
    var it = APP.tratativa.itens[i];
    if (!it) return;
    var label = it.produtoNome ? it.produtoNome.substring(0, 10) : 'Item ' + (i + 1);
    // update label text node
    b.firstChild.textContent = label;
    b.classList.toggle('ativo', i === APP.tratativa.itemAtivo);
  });
}

function ativarItemTrat(i) {
  APP.tratativa.itemAtivo = i;
  atualizarTabsAtiva();
  renderItemTratativaAtivo();
}

function adicionarItemTrat() {
  APP.tratativa.itens.push(criarItemTratativa());
  APP.tratativa.itemAtivo = APP.tratativa.itens.length - 1;
  // Re-render tabs
  var html = renderTratativaHtml();
  document.getElementById('conteudo').innerHTML = html;
  renderItemTratativaAtivo();
  bindAutocompleteTrat();
}

function removerItemTrat(i) {
  if (APP.tratativa.itens.length <= 1) return;
  APP.tratativa.itens.splice(i, 1);
  if (APP.tratativa.itemAtivo >= APP.tratativa.itens.length) {
    APP.tratativa.itemAtivo = APP.tratativa.itens.length - 1;
  }
  var html = renderTratativaHtml();
  document.getElementById('conteudo').innerHTML = html;
  renderItemTratativaAtivo();
  bindAutocompleteTrat();
}

function salvarRascunho() {
  var valido = APP.tratativa.itens.some(function(it) { return it.produtoId && it.chegou && it.quebra; });
  if (!valido) { toast('Preencha ao menos 1 item completo', 'erro'); return; }
  _salvarTratativa();
  toast('Tratativa salva!');
}

function _salvarTratativa() {
  var id = gerarId();
  var dataRef = APP.tratativa.itens[0] ? APP.tratativa.itens[0].data : hojeStr();
  var t = {
    id: id,
    data: dataRef,
    itens: APP.tratativa.itens.filter(function(it) { return it.produtoId; }).map(function(it, i) {
      return { produtoId: it.produtoId, unidade: it.unidade, data: it.data, chegou: it.chegou, quebra: it.quebra };
    })
  };
  Tratativas.salvar(t);
  // salvar fotos separadamente
  APP.tratativa.itens.forEach(function(it, i) {
    ['produto', 'balanca', 'etiqueta'].forEach(function(campo) {
      if (it.fotos[campo] && it.fotos[campo].length > 0) {
        Tratativas.salvarFotos(id, i, campo, it.fotos[campo]);
      }
    });
  });
  return id;
}

function enviarWA() {
  var valido = APP.tratativa.itens.some(function(it) { return it.produtoId && it.chegou && it.quebra; });
  if (!valido) { toast('Preencha ao menos 1 item completo', 'erro'); return; }
  var id = _salvarTratativa();
  var txt = gerarTextoWA(APP.tratativa.itens.filter(function(it) { return it.produtoId; }));
  if (navigator.share) {
    navigator.share({ text: txt }).then(function() {
      toast('Enviado!');
      APP.tratativa = { itens: [criarItemTratativa()], itemAtivo: 0 };
    }).catch(function() {});
  } else {
    var url = 'https://wa.me/?text=' + encodeURIComponent(txt);
    window.open(url, '_blank');
    toast('Abrindo WhatsApp...');
    APP.tratativa = { itens: [criarItemTratativa()], itemAtivo: 0 };
  }
}

function renderDashboard(cont) {
  if (!APP.mesSelecionado) APP.mesSelecionado = mesAtual();
  var ym = APP.mesSelecionado;
  var dash = calcDash(ym);
  var meta = dash.meta;
  var bom = dash.pctLiq <= meta;
  var meses = Tratativas.meses();
  if (meses.indexOf(ym) < 0 && meses.length > 0) {} // ok

  var html = '';
  // Seletor de mês
  html += '<div class="mes-seletor"><span style="font-weight:700;font-size:0.8rem;color:#888">MES:</span>';
  html += '<select onchange="mudMesDash(this.value)">';
  var mAll = meses.slice();
  if (mAll.indexOf(mesAtual()) < 0) mAll.push(mesAtual());
  mAll.sort().reverse().forEach(function(m) {
    html += '<option value="' + m + '"' + (m === ym ? ' selected' : '') + '>' + formatarMes(m) + '</option>';
  });
  html += '</select></div>';

  // Card situação
  html += '<div class="card-situacao">';
  html += '<div class="sit-titulo">Situacao - ' + formatarMes(ym) + '</div>';
  html += '<div class="sit-status">' + (bom ? '\u2705 BOM' : '\ud83d\udd34 ALERTA') + '</div>';
  html += '<div class="sit-detalhe">Quebra Liquida: <strong>' + dash.pctLiq.toFixed(2).replace('.', ',') + '%</strong> &nbsp;|&nbsp; Bruta: <strong>' + dash.pctBruta.toFixed(2).replace('.', ',') + '%</strong></div>';
  html += '<div class="sit-meta">Meta: ';
  html += '<input class="meta-input-small" id="meta-input" type="number" step="0.1" min="0" value="' + meta.toFixed(1) + '" onchange="salvarMeta(this.value)">%</div>';
  html += '</div>';

  // Cards grid
  html += '<div class="grid-cards">';
  html += '<div class="card"><div class="card-titulo">Vendas Informadas</div><div class="card-valor" style="font-size:1.2rem">' + formatarReal(dash.vendas) + '</div></div>';
  html += '<div class="card"><div class="card-titulo">Quebra Bruta</div><div class="card-valor" style="font-size:1.2rem">' + formatarReal(dash.quebraR) + '</div></div>';
  html += '</div>';
  html += '<div class="grid-cards">';
  html += '<div class="card"><div class="card-titulo">Fluig Aprovado</div><div class="card-valor" style="font-size:1.2rem;color:#2980b9">' + formatarReal(dash.fluig) + '</div></div>';
  html += '<div class="card"><div class="card-titulo">Quebra Liquida</div><div class="card-valor" style="font-size:1.2rem;color:' + (bom ? 'var(--verde-medio)' : 'var(--vermelho)') + '">' + formatarReal(dash.quebraLiq) + '</div></div>';
  html += '</div>';

  // Projeção
  html += '<div class="card" style="margin:8px 14px">';
  html += '<div class="card-titulo">Projecao do Mes</div>';
  html += '<div class="proj-row"><span class="proj-label">Ritmo atual (dia ' + dash.diaAtual + '/' + dash.totalDias + ')</span><span class="proj-val">' + dash.pctLiq.toFixed(2).replace('.', ',') + '%</span></div>';
  html += '<div class="proj-row"><span class="proj-label">Projecao final</span><span class="proj-val ' + (dash.pctProj > meta ? 'alerta' : '') + '" style="color:' + (dash.pctProj > meta ? 'var(--vermelho)' : 'var(--verde-medio)') + '">' + dash.pctProj.toFixed(2).replace('.', ',') + '%</span></div>';
  html += '<div class="proj-row"><span class="proj-label">Ainda pode quebrar</span><span class="proj-val" style="color:' + (dash.limiteR > 0 ? 'var(--verde-medio)' : 'var(--vermelho)') + '">' + formatarReal(Math.max(0, dash.limiteR)) + '</span></div>';
  html += '<div class="proj-row"><span class="proj-label">Venda projetada</span><span class="proj-val">' + formatarReal(dash.vendaProj) + '</span></div>';
  html += '</div>';

  // Informar venda
  html += '<div class="card" style="margin:8px 14px">';
  html += '<div class="card-titulo">Informar Venda do Dia</div>';
  html += '<div class="form-row">';
  html += '<div class="form-group"><label class="form-label">Data</label><input class="form-input" id="venda-data" type="date" value="' + hojeStr() + '"></div>';
  html += '<div class="form-group"><label class="form-label">Valor (R$)</label><input class="form-input" id="venda-valor" type="number" step="0.01" min="0" placeholder="0,00"></div>';
  html += '</div>';
  html += '<button class="btn btn-primario btn-bloco btn-sm" onclick="salvarVenda()">Salvar Venda</button>';
  html += '</div>';

  // Registrar fluig
  html += '<div class="card" style="margin:8px 14px">';
  html += '<div class="card-titulo">Registrar Fluig Aprovado</div>';
  html += '<div class="form-row">';
  html += '<div class="form-group"><label class="form-label">Data</label><input class="form-input" id="fluig-data" type="date" value="' + hojeStr() + '"></div>';
  html += '<div class="form-group"><label class="form-label">Valor (R$)</label><input class="form-input" id="fluig-valor" type="number" step="0.01" min="0" placeholder="0,00"></div>';
  html += '</div>';
  html += '<div class="form-group"><label class="form-label">Observacao</label><input class="form-input" id="fluig-obs" placeholder="Ex: Melancia 17/04"></div>';
  html += '<button class="btn btn-amarelo btn-bloco btn-sm" onclick="salvarFluig()">Registrar Fluig</button>';
  html += '</div>';

  // Lista fluigs
  var fluigs = Fluigs.listar(ym);
  if (fluigs.length > 0) {
    html += '<div class="secao-titulo">Fluigs do Mes</div>';

      html += '<div class="fluig-tag">' + formatarReal(f.valor) + '</div>';
      html += '</div>';
    });
  }

  // Top produtos
  if (dash.top.length > 0) {
    html += '<div class="card" style="margin:8px 14px">';
    html += '<div class="card-titulo">Top Produtos com Mais Quebra</div>';
    var maxR = dash.top[0].r;
    html += '<div class="grafico-barras">';
    dash.top.forEach(function(t) {
      var pct = maxR > 0 ? (t.r / maxR) * 100 : 0;
      html += '<div class="barra-item">';
      html += '<div class="barra-item-nome">' + escHtml(t.nome) + '</div>';
      html += '<div class="barra-item-track"><div class="barra-item-fill" style="width:' + pct + '%"></div><span class="barra-item-val">' + formatarReal(t.r) + '</span></div>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // Análise IA
  html += '<div style="padding:8px 14px 20px">';
  html += '<button class="btn btn-secundario btn-bloco" onclick="analisarIA()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Analise de Padroes com IA</button>';
  html += '</div>';
  html += '<div id="ia-analise"></div>';

  cont.innerHTML = html;
}

function mudMesDash(ym) {
  APP.mesSelecionado = ym;
  renderDashboard(document.getElementById('conteudo'));
}

function salvarMeta(v) {
  Meta.set(parseFloat(v) || 3.5);
  toast('Meta atualizada!');
}

function salvarVenda() {
  var data = document.getElementById('venda-data').value;
  var val = document.getElementById('venda-valor').value;
  if (!data || !val) { toast('Preencha data e valor', 'erro'); return; }
  Vendas.salvar(data, val);
  toast('Venda registrada!');
  renderDashboard(document.getElementById('conteudo'));
}

function salvarFluig() {
  var data = document.getElementById('fluig-data').value;
  var val = document.getElementById('fluig-valor').value;
  var obs = document.getElementById('fluig-obs').value.trim();
  if (!data || !val) { toast('Preencha data e valor', 'erro'); return; }
  var ym = data.substring(0, 7);
  Fluigs.adicionar(ym, { data: data, valor: parseFloat(val), obs: obs });
  toast('Fluig registrado!');
  renderDashboard(document.getElementById('conteudo'));
}

function analisarIA() {
  var el = document.getElementById('ia-analise');
  if (!el) return;
  var ym = APP.mesSelecionado || mesAtual();
  var dash = calcDash(ym);
  var resumo = 'Mes: ' + formatarMes(ym) + '. Vendas: ' + formatarReal(dash.vendas) + '. Quebra bruta: ' + dash.pctBruta.toFixed(2) + '%. Quebra liquida: ' + dash.pctLiq.toFixed(2) + '%. Meta: ' + dash.meta + '%. Top produtos: ' + dash.top.map(function(t) { return t.nome + '(' + formatarReal(t.r) + ')'; }).join(', ');
  el.innerHTML = '<div class="card" style="margin:0 14px 14px"><div class="ai-loading"><div class="spinner"></div>Analisando dados...</div></div>';
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'x-api-key': '' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      messages: [{
        role: 'user',
        content: 'Voce e um consultor de hortifruti. Analise os dados de quebra e de insights praticos em portugues brasileiro. ' + resumo + '. De 3 insights curtos e praticos para reduzir a quebra.'
      }]
    })
  }).then(function(r) { return r.json(); }).then(function(data) {
    var txt = (data.content && data.content[0] && data.content[0].text) || 'Nao foi possivel analisar.';
    el.innerHTML = '<div class="card" style="margin:0 14px 14px"><div class="card-titulo">Analise de Padroes</div><div style="font-size:0.88rem;line-height:1.6;color:var(--texto)">' + txt.replace(/\n/g, '<br>') + '</div></div>';
  }).catch(function() {
    el.innerHTML = '<div class="card" style="margin:0 14px 14px"><p style="color:#888;font-size:0.85rem">IA disponivel apenas em HTTPS (GitHub Pages).</p></div>';
  });
}

function renderHistorico(cont) {
  if (!APP.mesSelecionado) APP.mesSelecionado = mesAtual();
  var ym = APP.mesSelecionado;
  var meses = Tratativas.meses().slice();
  if (meses.indexOf(mesAtual()) < 0) meses.push(mesAtual());
  meses.sort().reverse();

  var html = '';
  html += '<div class="mes-seletor"><span style="font-weight:700;font-size:0.8rem;color:#888">MES:</span>';
  html += '<select onchange="mudMesHist(this.value)">';
  meses.forEach(function(m) {
    html += '<option value="' + m + '"' + (m === ym ? ' selected' : '') + '>' + formatarMes(m) + '</option>';
  });
  html += '</select></div>';

  html += '<div class="busca-wrap"><input class="busca-input" id="busca-hist" placeholder="\ud83d\udd0d Buscar produto/codigo..." oninput="filtrarHistorico()"></div>';
  html += '<div id="lista-hist"></div>';
  cont.innerHTML = html;
  filtrarHistorico();
}

function mudMesHist(ym) {
  APP.mesSelecionado = ym;
  renderHistorico(document.getElementById('conteudo'));
}

function filtrarHistorico() {
  var ym = APP.mesSelecionado || mesAtual();
  var q = (document.getElementById('busca-hist') || {value: ''}).value.toLowerCase().trim();
  var trats = Tratativas.listarMes(ym).slice().reverse();
  if (q) {
    trats = trats.filter(function(t) {
      return (t.itens || []).some(function(it) {
        var p = Produtos.porId(it.produtoId);
        return p && (p.nome.toLowerCase().includes(q) || p.codigo.toLowerCase().includes(q));
      });
    });
  }
  var el = document.getElementById('lista-hist');
  if (!el) return;
  if (trats.length === 0) {
    el.innerHTML = '<div class="texto-vazio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>Nenhuma tratativa encontrada</div>';
    return;
  }
  var html = '';
  trats.forEach(function(t) {
    var nomes = (t.itens || []).map(function(i) {
      var p = Produtos.porId(i.produtoId);
      return p ? p.nome : '?';
    }).join(', ');
    var nFotos = Tratativas.contarFotos(t.id, (t.itens || []).length);
    html += '<div class="hist-item" onclick="verTratativa(\'' + t.id + '\')">';
    html += '<div class="hist-item-header">';
    html += '<div>';
    html += '<div class="hist-item-prods">' + escHtml(nomes) + '</div>';
    html += '<div class="hist-item-data">' + formatarData(t.data) + '</div>';
    html += '</div>';
    if (nFotos > 0) {
      html += '<span class="hist-item-fotos">\ud83d\udcf7 ' + nFotos + '</span>';
    }
    html += '</div>';
    // Itens resumo
    (t.itens || []).slice(0, 3).forEach(function(it) {
      var p = Produtos.porId(it.produtoId);
      if (!p) return;
      html += '<div style="font-size:0.78rem;color:#888;margin-top:3px">';
      html += escHtml(p.nome) + ': quebra ' + formatarNum(it.quebra, it.unidade);
      html += '</div>';
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function verTratativa(id) {
  var t = Tratativas.porId(id);
  if (!t) return;
  var txt = gerarTextoWA(t.itens || []);
  var nFotos = Tratativas.contarFotos(t.id, (t.itens || []).length);

  var html = '<div class="modal-handle"></div>';
  html += '<div class="modal-titulo">Tratativa - ' + formatarData(t.data) + '</div>';
  html += '<div class="preview-wa">' + escHtml(txt) + '</div>';

  // Fotos
  if (nFotos > 0) {
    html += '<div class="secao-titulo" style="padding:14px 0 8px">Fotos (' + nFotos + ')</div>';
    (t.itens || []).forEach(function(it, i) {
      ['produto', 'balanca', 'etiqueta'].forEach(function(c) {
        var f = Tratativas.getFotos(t.id, i, c);
        f.forEach(function(src) {
          html += '<img src="' + src + '" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin:4px;border:2px solid var(--borda)">';
        });
      });
    });
  }

  html += '<div style="display:flex;gap:8px;margin-top:14px">';
  html += '<button class="btn btn-primario" style="flex:1" onclick="reenviarWA(\'' + t.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.72 12 19.79 19.79 0 0 1 1.67 3.4 2 2 0 0 1 3.64 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.97-.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Reenviar</button>';
  html += '<button class="btn btn-secundario" onclick="fecharModal()">Fechar</button>';
  html += '</div>';
  abrirModal(html);
}

function reenviarWA(id) {
  var t = Tratativas.porId(id);
  if (!t) return;
  var txt = gerarTextoWA(t.itens || []);
  if (navigator.share) {
    navigator.share({ text: txt }).catch(function() {});
  } else {
    window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank');
  }
}

// =========================================================
// MODAL GENÉRICO
// =========================================================
function abrirModal(html) {
  fecharModal();
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = '<div class="modal-box">' + html + '</div>';
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) fecharModal();
  });
  document.body.appendChild(overlay);
}

function fecharModal() {
  var el = document.getElementById('modal-overlay');
  if (el) el.remove();
}

// =========================================================
// SERVICE WORKER (PWA)
// =========================================================
function registrarSW() {
  if (!('serviceWorker' in navigator)) return;
  var swCode = [
    "var CACHE='flv-v1';",
    "self.addEventListener('install',function(e){self.skipWaiting();});",
    "self.addEventListener('activate',function(e){e.waitUntil(caches.keys().then(function(ks){return Promise.all(ks.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));}));});",
    "self.addEventListener('fetch',function(e){if(e.request.method!=='GET')return;e.respondWith(caches.open(CACHE).then(function(c){return c.match(e.request).then(function(r){return r||fetch(e.request).then(function(res){c.put(e.request,res.clone());return res;});});}));});"
  ].join('\n');
  var blob = new Blob([swCode], { type: 'text/javascript' });
  var url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(function() {});
}

  desenharSplash();
  document.getElementById('btn-entrar').addEventListener('click', function() {
    var sp = document.getElementById('splash');
    sp.classList.add('oculto');
    setTimeout(function() { sp.remove(); }, 700);
    document.getElementById('app').style.display = 'flex';
    APP.mesSelecionado = mesAtual();
    navegar('inicio');
    registrarSW();
  });
  // Auto-entrar se já visitou
  if (ST.get('flv_visited', false)) {
    document.getElementById('btn-entrar').click();
  }
  ST.set('flv_visited', true);
});
