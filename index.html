<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="description" content="Controle de Quebra FLV - Hortifruti">
<title>FLV Controle de Quebra</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="./index_files/css2" rel="stylesheet">
<style>
:root{
  --green-dark:#1c4a1c;
  --green:#2d6a2d;
  --green-mid:#3d8b3d;
  --green-light:#5aab5a;
  --green-pale:#c8e6c8;
  --green-bg:#eef2eb;
  --accent:#ff6b35;
  --accent2:#f4c430;
  --red:#d32f2f;
  --red-light:#ffebee;
  --white:#ffffff;
  --gray-50:#fafafa;
  --gray-100:#f5f5f5;
  --gray-200:#eeeeee;
  --gray-400:#bdbdbd;
  --gray-600:#757575;
  --gray-800:#424242;
  --shadow-sm:0 1px 4px rgba(0,0,0,.10);
  --shadow:0 2px 12px rgba(0,0,0,.12);
  --shadow-lg:0 8px 32px rgba(0,0,0,.16);
  --r:14px;
  --r-sm:8px;
  --nav-h:68px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--green-bg);font-family:'Nunito',sans-serif;}
body{display:flex;flex-direction:column;}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--green-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease;}
#splash.hide{opacity:0;pointer-events:none;}
#splash-canvas{border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.4);}
#splash h1{color:#fff;font-size:2rem;font-weight:900;margin-top:20px;letter-spacing:-0.5px;}
#splash p{color:var(--green-pale);font-size:.9rem;margin-top:4px;font-weight:600;letter-spacing:2px;text-transform:uppercase;}
#splash-btn{margin-top:28px;background:var(--green-light);color:#fff;border:none;border-radius:50px;padding:14px 40px;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(90,171,90,.5);font-family:'Nunito',sans-serif;transition:transform .15s;}
#splash-btn:active{transform:scale(.97);}
#splash-credit{position:absolute;bottom:24px;color:rgba(255,255,255,.4);font-size:.75rem;}

/* HEADER */
#header{background:var(--green-dark);color:#fff;padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;min-height:56px;flex-shrink:0;}
#header h2{font-size:1.1rem;font-weight:800;}
#header-sub{font-size:.75rem;color:var(--green-pale);font-weight:600;}
.header-icon-btn{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;}

/* APP */
#app{display:none;flex:1;flex-direction:column;overflow:hidden;}
#app.show{display:flex;}

/* SCREENS */
#screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;overflow-y:auto;padding:12px 12px calc(var(--nav-h) + 12px);display:none;}
.screen.active{display:block;}

/* BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:#fff;border-top:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-around;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 10px;border-radius:12px;transition:background .15s;flex:1;border:none;background:none;}
.nav-item .ni{font-size:1.4rem;line-height:1;}
.nav-item .nl{font-size:.65rem;font-weight:700;color:var(--gray-600);font-family:'Nunito',sans-serif;}
.nav-item.active .nl{color:var(--green);}
.nav-item.active .ni{filter:none;}
.nav-center-btn{width:56px;height:56px;background:var(--green);border:none;border-radius:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(45,106,45,.5);font-size:1.6rem;margin-top:-12px;flex-shrink:0;transition:transform .15s;}
.nav-center-btn:active{transform:scale(.94);}

/* CARDS */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow-sm);padding:14px;margin-bottom:10px;}
.card-row{display:flex;gap:8px;margin-bottom:10px;}
.card-mini{background:#fff;border-radius:var(--r);box-shadow:var(--shadow-sm);padding:12px;flex:1;text-align:center;}
.card-mini .cm-val{font-family:'Source Code Pro',monospace;font-size:1.4rem;font-weight:700;color:var(--green-dark);line-height:1.1;}
.card-mini .cm-lbl{font-size:.65rem;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
.cm-val.red{color:var(--red);}
.cm-val.green{color:var(--green);}

/* PROGRESS BAR */
.prog-wrap{background:var(--gray-200);border-radius:50px;height:10px;overflow:hidden;margin:6px 0;}
.prog-bar{height:100%;border-radius:50px;transition:width .5s ease;background:var(--green);}
.prog-bar.warn{background:var(--accent2);}
.prog-bar.over{background:var(--red);}

/* BADGE */
.badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:.72rem;font-weight:800;letter-spacing:.3px;}
.badge-ok{background:#e8f5e9;color:#2e7d32;}
.badge-warn{background:#fff3e0;color:#e65100;}
.badge-red{background:var(--red-light);color:var(--red);}

/* SECTION TITLE */
.sec-title{font-size:.72rem;font-weight:800;color:var(--gray-600);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;}

/* FORM */
.form-group{margin-bottom:12px;}
.form-label{font-size:.78rem;font-weight:700;color:var(--gray-800);margin-bottom:4px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-size:.9rem;font-family:'Nunito',sans-serif;background:#fff;color:var(--gray-800);outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--green);}
.form-textarea{min-height:80px;resize:vertical;}
.form-hint{font-size:.7rem;color:var(--gray-600);margin-top:3px;}

/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:var(--r-sm);font-size:.88rem;font-weight:700;cursor:pointer;border:none;font-family:'Nunito',sans-serif;transition:transform .15s,opacity .2s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--green);color:#fff;}
.btn-secondary{background:var(--gray-100);color:var(--gray-800);}
.btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green);}
.btn-danger{background:var(--red-light);color:var(--red);}
.btn-sm{padding:7px 12px;font-size:.78rem;}
.btn-block{width:100%;}
.btn-icon{width:40px;height:40px;padding:0;border-radius:10px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* TRATATIVA TABS */
#trat-tabs-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
#trat-tabs-bar::-webkit-scrollbar{display:none;}
.trat-tab{flex-shrink:0;padding:7px 14px;border-radius:50px;font-size:.8rem;font-weight:700;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);font-family:'Nunito',sans-serif;transition:all .2s;}
.trat-tab.active{background:var(--green);color:#fff;border-color:var(--green);}
.add-tab-btn{flex-shrink:0;width:34px;height:34px;border-radius:50%;background:var(--green-bg);border:1.5px dashed var(--green);color:var(--green);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* AUTOCOMPLETE */
.ac-wrap{position:relative;}
.ac-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--green);border-radius:var(--r-sm);z-index:200;box-shadow:var(--shadow);max-height:180px;overflow-y:auto;}
.ac-item{padding:10px 12px;cursor:pointer;font-size:.88rem;border-bottom:1px solid var(--gray-100);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.selected{background:var(--green-bg);}
.ac-code{font-family:'Source Code Pro',monospace;font-size:.78rem;color:var(--gray-600);}

/* PHOTO SECTION */
.photo-section{margin-top:10px;}
.photo-label{font-size:.78rem;font-weight:700;color:var(--gray-800);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.photo-btns{display:flex;gap:8px;margin-bottom:8px;}
.photo-grid{display:flex;flex-wrap:wrap;gap:6px;}
.photo-thumb{width:70px;height:70px;border-radius:var(--r-sm);object-fit:cover;cursor:pointer;border:2px solid var(--gray-200);}
.photo-del{position:relative;display:inline-block;}
.photo-del-btn{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* WHATSAPP PREVIEW */
.wa-preview{background:#075e54;border-radius:var(--r);padding:14px;color:#fff;font-family:'Source Code Pro',monospace;font-size:.82rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;}

/* PRODUCT LIST */
.prod-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100);}
.prod-item:last-child{border-bottom:none;}
.prod-icon{width:40px;height:40px;background:var(--green-bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-meta{font-size:.72rem;color:var(--gray-600);font-family:'Source Code Pro',monospace;}
.prod-actions{display:flex;gap:6px;}

/* HISTORY */
.hist-item{padding:12px;background:#fff;border-radius:var(--r);box-shadow:var(--shadow-sm);margin-bottom:8px;cursor:pointer;}
.hist-date{font-size:.72rem;color:var(--gray-600);font-weight:700;margin-bottom:4px;}
.hist-prods{font-size:.82rem;font-weight:600;color:var(--gray-800);}
.hist-meta{display:flex;gap:8px;margin-top:6px;}
.hist-fotos{font-size:.7rem;color:var(--gray-600);}

/* DASHBOARD */
.dash-situacao{border-radius:var(--r);padding:16px;margin-bottom:10px;text-align:center;}
.dash-situacao.ok{background:linear-gradient(135deg,#2e7d32,#43a047);}
.dash-situacao.alert{background:linear-gradient(135deg,#c62828,#e53935);}
.dash-sit-title{font-size:1.1rem;font-weight:900;color:#fff;}
.dash-sit-pct{font-family:'Source Code Pro',monospace;font-size:2.2rem;font-weight:700;color:#fff;line-height:1;}
.dash-sit-lbl{font-size:.75rem;color:rgba(255,255,255,.8);font-weight:600;text-transform:uppercase;letter-spacing:1px;}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;}
#modal-overlay.show{display:flex;}
#modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:1.1rem;font-weight:800;margin-bottom:14px;color:var(--green-dark);}
.modal-close{float:right;background:var(--gray-100);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:1rem;}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--green-dark);color:#fff;padding:10px 20px;border-radius:50px;font-size:.85rem;font-weight:700;z-index:1000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* CHART BARS */
.chart-bar-wrap{margin:6px 0;}
.chart-bar-label{font-size:.72rem;font-weight:700;color:var(--gray-800);margin-bottom:3px;display:flex;justify-content:space-between;}
.chart-bar-bg{background:var(--gray-100);border-radius:4px;height:22px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:4px;background:var(--green);display:flex;align-items:center;padding-left:8px;font-size:.7rem;color:#fff;font-weight:700;font-family:'Source Code Pro',monospace;transition:width .6s ease;min-width:0;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:1rem;}

/* MONTH SELECTOR */
.month-sel{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.month-sel select{flex:1;}
.month-arrow{width:36px;height:36px;background:var(--gray-100);border:none;border-radius:var(--r-sm);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}

/* SCAN LOADING */
.scan-loading{display:none;align-items:center;gap:8px;color:var(--green);font-size:.82rem;font-weight:700;margin-top:8px;}
.scan-loading.show{display:flex;}
.spin{animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}

/* PHOTO VIEWER */
#photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;display:none;align-items:center;justify-content:center;flex-direction:column;}
#photo-viewer.show{display:flex;}
#photo-viewer img{max-width:100%;max-height:80vh;border-radius:var(--r-sm);}
#photo-viewer-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:40px;height:40px;font-size:1.2rem;cursor:pointer;}

/* DIVIDER */
.divider{height:1px;background:var(--gray-200);margin:10px 0;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--gray-600);}
.empty-icon{font-size:2.5rem;margin-bottom:8px;}
.empty-txt{font-size:.88rem;font-weight:600;}

/* QUOTA */
.quota-bar{background:var(--gray-100);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.quota-txt{font-size:.72rem;color:var(--gray-600);font-weight:700;}
.quota-val{font-family:'Source Code Pro',monospace;font-size:.78rem;font-weight:700;color:var(--green);}

/* FLUIG ITEM */
.fluig-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-100);}
.fluig-date{font-size:.72rem;color:var(--gray-600);font-family:'Source Code Pro',monospace;}
.fluig-val{font-family:'Source Code Pro',monospace;font-weight:700;color:var(--green);}

/* INLINE ERROR */
.inline-err{color:var(--red);font-size:.72rem;margin-top:3px;font-weight:700;}

/* HIGHLIGHT TEXT */
.highlight{background:linear-gradient(120deg,var(--green-pale),var(--green-pale));border-radius:3px;padding:0 3px;}

/* SCROLL */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gray-400);border-radius:2px;}
</style>
</head>

<!-- APP -->
<div id="app">
  <div id="header">
    <div>
      <div id="header-title" style="font-size:1rem;font-weight:800;color:#fff;"></div>
      <div id="header-sub" style="font-size:.7rem;color:var(--green-pale);font-weight:600;"></div>

      <span class="ni">🥦</span><span class="nl">Produtos</span>

<!-- MODAL GENERICO -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box" onclick="event.stopPropagation()">
    <span class="modal-close" onclick="closeModal()">×</span>
    <div id="modal-content"></div>
  </div>
</div>

<!-- PHOTO VIEWER -->
<div id="photo-viewer">
  <button id="photo-viewer-close" onclick="closePhotoViewer()">×</button>
  <img id="photo-viewer-img" src="file:///C:/Users/willi/Downloads/controle-quebra-flv_7.html" alt="foto">

<!-- TOAST -->
<div id="toast"></div>

<script>
// ===================== UTILS =====================
function uid(){return Date.now()+'_'+Math.floor(Math.random()*99999);}
function today(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function monthStr(d){var dt=d?new Date(d+'T12:00:00'):new Date();return dt.getFullYear()+'-'+pad(dt.getMonth()+1);}
function pad(n){return n<10?'0'+n:String(n);}
function fmtDate(s){if(!s)return'';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtNum(v,dec){if(isNaN(v))return'0';return parseFloat(v).toFixed(dec||0).replace('.',',');}
function fmtBrl(v){if(isNaN(v))return'R$ 0,00';return'R$ '+parseFloat(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function pctStr(v){if(isNaN(v))return'0%';return parseFloat(v).toFixed(2).replace('.',',')+' %';}
function toast(msg,dur){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},dur||2200);
}
function openPhotoViewer(src){
  document.getElementById('photo-viewer-img').src=src;
  document.getElementById('photo-viewer').classList.add('show');
}
function closePhotoViewer(){document.getElementById('photo-viewer').classList.remove('show');}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay')){
    document.getElementById('modal-overlay').classList.remove('show');
  }
}
function openModal(html){
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('show');
}
function getApiKey(){return localStorage.getItem('flv_apikey')||'';}
function setApiKey(k){localStorage.setItem('flv_apikey',k);}

// ===================== STORAGE =====================
function saveJSON(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){toast('\u26a0\ufe0f Armazenamento cheio! Libere espaco.');}};
function loadJSON(key,def){try{var v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}};
function getMonths(){return loadJSON('flv_meses',[]);}
function addMonth(m){var ms=getMonths();if(ms.indexOf(m)===-1){ms.push(m);ms.sort();saveJSON('flv_meses',ms);}};

// PRODUTOS
function getProdutos(){return loadJSON('flv_produtos',[]);}
function saveProdutos(ps){saveJSON('flv_produtos',ps);}
function getProduto(id){return getProdutos().find(function(p){return p.id===id;})||null;}
function getProdutoAtivos(){return getProdutos().filter(function(p){return p.ativo!==false;});}

// TRATATIVAS
function getTratId(id){return loadJSON('flv_t_'+id,null);}
function saveTrat(t){saveJSON('flv_t_'+t.id,t);addMonth(t.mes);}
function getIdxMes(m){return loadJSON('flv_idx_'+m,[]);}
function addIdxMes(m,id){var idx=getIdxMes(m);if(idx.indexOf(id)===-1){idx.push(id);saveJSON('flv_idx_'+m,idx);}}
function getTratsMes(m){var ids=getIdxMes(m);return ids.map(getTratId).filter(Boolean);}

// FOTOS
function savePhoto(tratId,itemIdx,campo,idx,data){
  var key='flv_ph_'+tratId+'_'+itemIdx+'_'+campo+'_'+idx;
  try{localStorage.setItem(key,data);return true;}catch(e){toast('\u26a0\ufe0f Foto nao salva: armazenamento cheio');return false;}
}
function getPhotos(tratId,itemIdx,campo){
  var res=[];
  for(var i=0;i<50;i++){
    var key='flv_ph_'+tratId+'_'+itemIdx+'_'+campo+'_'+i;
    var v=localStorage.getItem(key);
    if(!v)break;
    res.push(v);
  }
  return res;
}
function delPhotos(tratId,itemIdx,campo){
  for(var i=0;i<50;i++){
    var key='flv_ph_'+tratId+'_'+itemIdx+'_'+campo+'_'+i;
    if(!localStorage.getItem(key))break;
    localStorage.removeItem(key);
  }
}

// VENDAS
function saveVenda(data,valor){saveJSON('flv_venda_'+data,{data:data,valor:parseFloat(valor)});}
function getVendasMes(m){
  var res=[];
  var keys=[];
  for(var k in localStorage){if(k.indexOf('flv_venda_'+m)===0)keys.push(k);}
  keys.forEach(function(k){var v=loadJSON(k,null);if(v)res.push(v);});
  return res;
}
function getTotalVendasMes(m){return getVendasMes(m).reduce(function(a,v){return a+v.valor;},0);}

// FLUIGS
function saveFluig(m,f){var fs=loadJSON('flv_fluigs_'+m,[]);fs.push(f);saveJSON('flv_fluigs_'+m,fs);}
function getFluigs(m){return loadJSON('flv_fluigs_'+m,[]);}
function getTotalFluigMes(m){return getFluigs(m).reduce(function(a,f){return a+parseFloat(f.valor||0);},0);}

// META
function getMeta(){return parseFloat(localStorage.getItem('flv_meta')||'3.5');}
function setMeta(v){localStorage.setItem('flv_meta',v);}

// STORAGE USAGE
function storageUsed(){
  var total=0;
  for(var k in localStorage){if(localStorage.hasOwnProperty(k)&&k.indexOf('flv_')===0)total+=localStorage[k].length;}
  return Math.round(total*2/1024);// KB
}

// ===================== COMPRIMIR FOTO =====================
function compressImage(file,cb){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=800;
      var w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      var c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.72));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ===================== CALCULOS DASHBOARD =====================
function calcDash(m){
  var trats=getTratsMes(m);
  var prods=getProdutos();
  var totalQuebra=0;
  trats.forEach(function(t){
    t.itens.forEach(function(item){
      var p=prods.find(function(x){return x.id===item.produtoId;});
      if(p)totalQuebra+=(parseFloat(item.quebra)||0)*parseFloat(p.preco||0);
    });
  });
  var vendas=getTotalVendasMes(m);
  var fluig=getTotalFluigMes(m);
  var pctBruta=vendas>0?(totalQuebra/vendas*100):0;
  var pctLiq=vendas>0?((totalQuebra-fluig)/vendas*100):0;
  var hoje=new Date();
  var diaAtual=hoje.getDate();
  var diasMes=new Date(hoje.getFullYear(),hoje.getMonth()+1,0).getDate();
  var ritmo=diaAtual>0?totalQuebra/diaAtual:0;
  var proj=ritmo*diasMes;
  var vendaProj=vendas>0?(vendas/diaAtual*diasMes):0;
  var limite=vendaProj>0?(vendaProj*getMeta()/100)-(totalQuebra-fluig):0;
  // top produtos
  var prodQ={};
  trats.forEach(function(t){
    t.itens.forEach(function(item){
      var p=prods.find(function(x){return x.id===item.produtoId;});
      if(p){
        var v=(parseFloat(item.quebra)||0)*parseFloat(p.preco||0);
        prodQ[p.id]=(prodQ[p.id]||{nome:p.nome,v:0});
        prodQ[p.id].v+=v;
      }
    });
  });
  var topProds=Object.values(prodQ).sort(function(a,b){return b.v-a.v;}).slice(0,6);
  return{totalQuebra:totalQuebra,vendas:vendas,fluig:fluig,pctBruta:pctBruta,pctLiq:pctLiq,proj:proj,vendaProj:vendaProj,limite:limite,topProds:topProds,diaAtual:diaAtual,diasMes:diasMes};
}

// ===================== GERAR TEXTO WHATSAPP =====================
function gerarWaText(trat){
  var linhas=[];
  trat.itens.forEach(function(item,i){
    var p=getProduto(item.produtoId);
    if(!p)return;
    var nome=p.nome.toUpperCase();
    var un=p.unidade==='kg'?'kg':'un';
    var qChegou=p.unidade==='kg'?fmtNum(item.chegou,1):String(parseInt(item.chegou)||0);
    var qQuebra=p.unidade==='kg'?fmtNum(item.quebra,1):String(parseInt(item.quebra)||0);
    var linha='C\u00f3digo\nC\u00f3d: '+p.codigo+'\n'+nome+' '+un.toUpperCase()+'\n'+fmtDate(item.data)+'\nChegou: '+qChegou+' '+un+'\nQuantidade da quebra: '+qQuebra+' '+un;
    linhas.push(linha);
  });
  return linhas.join('\n\n');
}

  html+='<input class="form-input" id="mp-meta" type="number" step="0.1" value="'+escHtml(String(p.metaQuebra||'5'))+'" placeholder="5"/></div>';
  if(getApiKey()){
    html+='<div class="divider"></div>';
    html+='<div class="form-group"><label class="form-label">&#x1F4F7; Ler codigo/nome via foto da nota fiscal (IA)</label>';
    html+='<div style="display:flex;gap:8px;">';
    html+='<label class="btn btn-outline" style="flex:1;cursor:pointer;">&#x1F4F7; Camera<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="lerNotaFiscal(this)"/></label>';
    html+='<label class="btn btn-secondary" style="flex:1;cursor:pointer;">&#x1F4C1; Galeria<input type="file" accept="image/*" style="display:none;" onchange="lerNotaFiscal(this)"/></label>';
    html+='</div><div class="scan-loading" id="scan-loading"><span class="spin">&#8635;</span> Analisando imagem...</div></div>';
  }

  html+='<button class="btn btn-primary btn-block" style="margin-top:10px;" onclick="salvarProdutoModal(\''+id+'\')">Salvar Produto</button>';

}

function lerNotaFiscal(input){
  var file=input.files[0];if(!file)return;
  var loading=document.getElementById('scan-loading');
  if(loading)loading.classList.add('show');
  compressImage(file,function(b64){
    var data=b64.split(',')[1];
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:200,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:data}},
          {type:'text',text:'Extraia apenas o codigo de barras (ou codigo do produto) e o nome do produto desta nota fiscal/etiqueta. Responda somente com JSON: {"codigo":"...","nome":"..."} sem explicacoes.'}
        ]}]
      })
    }).then(function(r){return r.json();}).then(function(res){
      if(loading)loading.classList.remove('show');
      try{
        var txt=res.content[0].text.replace(/```json|```/g,'').trim();
        var j=JSON.parse(txt);
        if(j.codigo){var el=document.getElementById('mp-cod');if(el)el.value=j.codigo;}
        if(j.nome){var el2=document.getElementById('mp-nome');if(el2)el2.value=j.nome;}
        toast('&#x2705; Codigo e nome lidos com sucesso!');
      }catch(e){toast('Nao foi possivel ler os dados da imagem');}
    }).catch(function(){if(loading)loading.classList.remove('show');toast('Erro ao chamar API');});
  });
}

function salvarProdutoModal(id){
  var cod=(document.getElementById('mp-cod').value||'').trim();
  var nome=(document.getElementById('mp-nome').value||'').trim();
  var un=document.getElementById('mp-un').value;
  var preco=parseFloat(document.getElementById('mp-preco').value||'0');
  var meta=parseFloat(document.getElementById('mp-meta').value||'5');
  var errEl=document.getElementById('mp-err');
  if(!cod){errEl.textContent='Informe o codigo.';return;}
  if(!nome){errEl.textContent='Informe o nome.';return;}
  if(isNaN(preco)||preco<=0){errEl.textContent='Preco invalido.';return;}
  var ps=getProdutos();
  if(!id){
    // check unique
    var dup=ps.find(function(p){return p.codigo===cod&&p.ativo!==false;});
    if(dup){errEl.textContent='Codigo ja cadastrado.';return;}
    var novo={id:uid(),codigo:cod,nome:nome,unidade:un,preco:preco,metaQuebra:meta,ativo:true};
    ps.push(novo);saveProdutos(ps);
    toast('Produto cadastrado!');
  } else {
    var idx=ps.findIndex(function(p){return p.id===id;});
    if(idx>-1){
      ps[idx].codigo=cod;ps[idx].nome=nome;ps[idx].unidade=un;ps[idx].preco=preco;ps[idx].metaQuebra=meta;
      saveProdutos(ps);toast('Produto atualizado!');
    }
  }
  closeModal();renderProdutos();
}
function excluirProduto(id){
  if(!confirm('Excluir este produto?'))return;
  var ps=getProdutos();
  var idx=ps.findIndex(function(p){return p.id===id;});
  if(idx>-1){ps[idx].ativo=false;saveProdutos(ps);}
  toast('Produto removido!');renderProdutos();
}

function addFoto(input,campo){
  var item=tratState.itens[tratState.activeTab];
  var files=input.files;if(!files||!files.length)return;
  var single=(campo==='etiqueta');
  if(single&&item['fotos_'+campo].length>0){toast('Etiqueta: apenas 1 foto');return;}
  var arr=Array.from(files).slice(0,single?1:10);
  var remaining=arr.length;
  arr.forEach(function(file){
    compressImage(file,function(b64){
      item['fotos_'+campo].push(b64);
      remaining--;
      if(remaining===0)renderTratativa();
    });
  });
}
function delFoto(campo,idx){
  var item=tratState.itens[tratState.activeTab];
  item['fotos_'+campo].splice(idx,1);
  renderTratativa();
}

function tratProdInput(val){
  var item=tratState.itens[tratState.activeTab];
  item.produtoNome=val;item.produtoId=null;
  var ac=document.getElementById('trat-ac');
  if(val.length<2){ac.style.display='none';return;}
  var ps=getProdutoAtivos().filter(function(p){return p.nome.toLowerCase().indexOf(val.toLowerCase())>-1||p.codigo.toLowerCase().indexOf(val.toLowerCase())>-1;});
  if(!ps.length){ac.style.display='none';return;}
  ac.innerHTML='';
  ps.slice(0,6).forEach(function(p){
    var div=document.createElement('div');
    div.className='ac-item';
    div.innerHTML=escHtml(p.nome)+' <span class="ac-code">'+escHtml(p.codigo)+'</span>';
    div.onclick=function(){
      item.produtoId=p.id;item.produtoNome=p.nome;
      ac.style.display='none';
      renderTratativa();
    };
    ac.appendChild(div);
  });
  ac.style.display='block';
}

function tratSetField(f,v){
  tratState.itens[tratState.activeTab][f]=v;
  // update preview
  var pre=document.getElementById('wa-preview-box');
  if(pre)pre.textContent=gerarWaText(tratState);
}
function switchTratTab(i){tratState.activeTab=i;renderTratativa();}
function addTratItem(){tratState.itens.push(criarItemTrat());tratState.activeTab=tratState.itens.length-1;renderTratativa();}
function removeTratItem(i){
  if(tratState.itens.length<=1)return;
  tratState.itens.splice(i,1);
  if(tratState.activeTab>=tratState.itens.length)tratState.activeTab=tratState.itens.length-1;
  renderTratativa();
}

function validarTrat(){
  var ok=true;
  tratState.itens.forEach(function(it,i){
    if(!it.produtoId){toast('Produto '+(i+1)+': selecione um produto da lista');ok=false;}
    else if(!it.chegou){toast('Produto '+(i+1)+': informe a quantidade chegou');ok=false;}
    else if(!it.quebra){toast('Produto '+(i+1)+': informe a quebra');ok=false;}
  });
  return ok;
}

function salvarTratativa(){
  if(!validarTrat())return;
  var m=monthStr(tratState.itens[0].data);
  var t={id:tratState.id,mes:m,itens:tratState.itens.map(function(it){return{produtoId:it.produtoId,data:it.data,chegou:it.chegou,quebra:it.quebra};}),criadoEm:today()};
  // salvar fotos separadas
  tratState.itens.forEach(function(it,ii){
    ['produto','balanca','etiqueta'].forEach(function(campo){
      delPhotos(tratState.id,ii,campo);
      it['fotos_'+campo].forEach(function(b64,fi){savePhoto(tratState.id,ii,campo,fi,b64);});
    });
  });
  saveTrat(t);addIdxMes(m,t.id);
  toast('Tratativa salva!');
  initTratState();renderTratativa();
}

function enviarWhatsApp(){
  if(!validarTrat())return;
  var txt=gerarWaText(tratState);
  if(navigator.share){
    navigator.share({text:txt}).then(function(){salvarTratativa();}).catch(function(){});
  } else {
    var url='https://wa.me/?text='+encodeURIComponent(txt);
    window.open(url,'_blank');
    salvarTratativa();
  }
}

  saveVenda(d,v);toast('Venda registrada!');renderDashboard();

  var d=document.getElementById('dash-fd').value;

var histMes=monthStr();

function renderHistorico(){
  var ms=getMonths();if(ms.indexOf(histMes)===-1)ms.push(histMes);ms.sort();
  var trats=getTratsMes(histMes);
  var q=(histBusca||'').toLowerCase().trim();
  if(q){
    trats=trats.filter(function(t){
      return t.itens.some(function(it){
        var p=getProduto(it.produtoId);
        return p&&(p.nome.toLowerCase().indexOf(q)>-1||p.codigo.toLowerCase().indexOf(q)>-1);
      });
    });
  }
  trats=trats.slice().reverse();
  var html='';
  // mes select
  html+='<div class="month-sel"><select class="form-select" onchange="histMes=this.value;renderHistorico();">';
  ms.forEach(function(mm){html+='<option value="'+mm+'"'+(mm===histMes?' selected':'')+'>'+(function(){var p=mm.split('-');return p[1]+'/'+p[0];})()+'</option>';});
  html+='</select></div>';
  // busca
  html+='<div class="search-wrap"><span class="search-icon">&#x1F50D;</span>';
  html+='<input class="form-input" placeholder="Buscar produto..." value="'+escHtml(histBusca)+'" oninput="histBusca=this.value;renderHistorico();"/></div>';
  if(trats.length===0){
    html+='<div class="empty-state"><div class="empty-icon">&#x1F4C2;</div><div class="empty-txt">Nenhuma tratativa encontrada</div></div>';
  } else {
    trats.forEach(function(t){
      var nomes=t.itens.map(function(it){var p=getProduto(it.produtoId);return p?p.nome:'?';}).join(', ');
      var numFotos=0;
      t.itens.forEach(function(it,ii){
        ['produto','balanca','etiqueta'].forEach(function(c){numFotos+=getPhotos(t.id,ii,c).length;});
      });
      html+='<div class="hist-item" onclick="verTratativa(\''+t.id+'\')">';

      html+='</div></div>';
    });
  }
  document.getElementById('screen-historico').innerHTML=html;
}

  // watermelon
  ctx.save();ctx.translate(60,70);
  ctx.fillStyle='#e53935';ctx.beginPath();ctx.arc(0,0,32,Math.PI,0);ctx.fill();
  ctx.fillStyle='#43a047';ctx.beginPath();ctx.arc(0,0,32,0,Math.PI);ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-32,0);ctx.lineTo(32,0);ctx.stroke();
  ctx.fillStyle='#1a1a1a';[-10,0,10].forEach(function(x){ctx.beginPath();ctx.ellipse(x,-12,2,3,0.3,0,Math.PI*2);ctx.fill();});
  ctx.restore();
  // broccoli
  ctx.save();ctx.translate(155,60);
  ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#388e3c';ctx.beginPath();ctx.arc(-10,-5,12,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(10,-5,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1b5e20';ctx.fillRect(-4,15,8,18);
  ctx.restore();
  // carrot
  ctx.save();ctx.translate(150,140);ctx.rotate(-0.3);
  ctx.fillStyle='#ff6d00';ctx.beginPath();ctx.moveTo(0,-30);ctx.lineTo(-10,10);ctx.lineTo(10,10);ctx.closePath();ctx.fill();
  ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.moveTo(0,-30);ctx.bezierCurveTo(-15,-40,-5,-48,0,-35);ctx.fill();
  ctx.restore();
  // apple
  ctx.save();ctx.translate(65,150);
  ctx.fillStyle='#d32f2f';ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#b71c1c';ctx.beginPath();ctx.arc(-5,0,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1b5e20';ctx.fillRect(-2,-22,4,12);
  ctx.restore();
  // grape
  ctx.save();ctx.translate(110,155);
  var gpos=[[-8,-8],[0,-12],[8,-8],[-12,0],[-4,2],[4,2],[12,0],[-6,12],[6,12]];
  ctx.fillStyle='#7b1fa2';
  gpos.forEach(function(gp){ctx.beginPath();ctx.arc(gp[0],gp[1],7,0,Math.PI*2);ctx.fill();});
  ctx.restore();
  // corn
  ctx.save();ctx.translate(108,58);ctx.rotate(0.2);
  ctx.fillStyle='#f9a825';ctx.beginPath();ctx.ellipse(0,0,10,22,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f57f17';
  for(var i=-3;i<=3;i++){for(var j=-3;j<=3;j++){ctx.beginPath();ctx.arc(i*4,j*6,2,0,Math.PI*2);ctx.fillStyle=i%2===0?'#f9a825':'#f57f17';ctx.fill();}}
  ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.moveTo(-10,-20);ctx.bezierCurveTo(-20,-35,-5,-38,0,-22);ctx.fill();
  ctx.restore();
  // shine
  ctx.save();ctx.translate(55,55);ctx.fillStyle='rgba(255,255,255,0.06)';ctx.beginPath();ctx.ellipse(0,0,60,30,0.5,0,Math.PI*2);ctx.fill();ctx.restore();
}

// ===================== SERVICE WORKER =====================
function registerSW(){
  if(!('serviceWorker' in navigator))return;
  var swCode='self.addEventListener("install",function(e){self.skipWaiting();});'+
    'self.addEventListener("activate",function(e){e.waitUntil(self.clients.claim());});'+
    'self.addEventListener("fetch",function(e){if(e.request.url.indexOf("api.anthropic.com")>-1)return;'+
    'e.respondWith(fetch(e.request).catch(function(){return new Response("Offline",{status:503});}));});';
  var blob=new Blob([swCode],{type:'text/javascript'});
  var url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(function(){});
}

// ===================== INIT =====================
function entrarApp(){
  document.getElementById('splash').classList.add('hide');
  document.getElementById('app').classList.add('show');
  setTimeout(function(){document.getElementById('splash').style.display='none';},600);
  initTratState();
  renderScreen('inicio');
  updateHeader('inicio');
}

window.onload=function(){
  registerSW();
  drawSplash();
  // auto-enter se ja tiver usado antes
  if(localStorage.getItem('flv_firstuse')){
    entrarApp();
  } else {
    localStorage.setItem('flv_firstuse','1');
  }
};
